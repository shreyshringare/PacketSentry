metadata:
  version: 1.1.0
  updated_at: 2026-05-19

policies:
  - name: Banned Payloads
    type: payload_signature
    action: DENY
    patterns:
      - "select * from"
      - "/etc/passwd"
      - "\x90\x90\x90"
      - "' OR '1'='1"

  - name: Rate Limiting
    type: protocol_limit
    action: DENY
    rules:
      max_pps_per_ip: 5000
      max_syn_connections: 100

  - name: Restricted Ports
    type: port_restriction
    action: DENY
    rules:
      allowed_ports: [80, 443, 8000, 22]

signatures:
  - id: SIG-001
    name: SQL Injection Attempt
    severity: HIGH
    patterns:
      - "SELECT * FROM"
      - "UNION SELECT"
      - "OR 1=1"
      - "DROP TABLE"
      - "'; --"
    protocol: HTTP

  - id: SIG-002
    name: Port Scan Detection
    severity: MEDIUM
    patterns:
      - "\x00\x00\x00\x00"
    protocol: TCP
    threshold: 10

  - id: SIG-003
    name: DNS Tunneling
    severity: HIGH
    patterns:
      - ".onion"
      - "base64"
    protocol: DNS

  - id: SIG-004
    name: XSS Attempt
    severity: HIGH
    patterns:
      - "<script>"
      - "javascript:"
      - "onerror="
    protocol: HTTP

  - id: SIG-005
    name: Directory Traversal
    severity: HIGH
    patterns:
      - "../../../"
      - "..\\..\\..\\"
      - "%2e%2e%2f"
    protocol: HTTP

  - id: SIG-006
    name: Brute Force SSH
    severity: CRITICAL
    patterns:
      - "SSH-2.0"
    protocol: TCP
    threshold: 20

  - id: SIG-007
    name: Shellshock Attack
    severity: CRITICAL
    patterns:
      - "() { :;"
      - "() {"
    protocol: HTTP

  - id: SIG-008
    name: Log4Shell
    severity: CRITICAL
    patterns:
      - "${jndi:"
      - "${${lower:"
    protocol: HTTP

  - id: SIG-009
    name: Command Injection
    severity: HIGH
    patterns:
      - "; cat /etc/passwd"
      - "| whoami"
      - "; /bin/sh"
      - "&& wget"
    protocol: HTTP

  - id: SIG-010
    name: Nikto Scanner
    severity: MEDIUM
    patterns:
      - "Nikto"
      - "nikto"
    protocol: HTTP